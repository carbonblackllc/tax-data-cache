name: Scrape Tax Data

on:
  schedule:
    # Runs at 3:00 AM UTC on the 1st of every month
    - cron: '0 3 1 * *'
  # Allows you to run it manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # Permission to write back to the repository
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Run tax scraper
        run: python Tax_Scraper.py
      
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add specific file types
          git add tax_data/*.json
          git add tax_data/*.csv
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            echo "Changes detected:"
            git diff --staged --stat
            git commit -m "Update tax parameters: $(date +%Y-%m-%d)"
            git push
          fi
